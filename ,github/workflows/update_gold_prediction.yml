name: Update Gold Prediction

# Runs on a schedule, entirely on GitHub's own free infrastructure.
#
# HISTORY: tried GoldAPI.io (100/month, safe cap: every 8 hours), then
# Binance (blocked from GitHub Actions with HTTP 451, reverted), now on
# GoldPriceZ.com (60 requests/hour, confirmed directly by their support
# team). Hourly uses just 1 of the 60 allowed per hour -- comfortable
# margin, and more frequent than hourly doesn't add much real value for
# a next-day-style prediction anyway.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prediction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn scipy requests

      - name: Run prediction updater
        env:
          GOLDPRICEZ_API_KEY: ${{ secrets.GOLDPRICEZ_API_KEY }}
        run: python gold_predictor_updater.py

      - name: Commit and push updated prediction data
        run: |
          git config user.name "gold-predictor-bot"
          git config user.email "actions@github.com"
          git add gold_prediction_latest.json gold_price_history.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update gold prediction data [automated]"
          git push
