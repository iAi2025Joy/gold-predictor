name: Update Gold Prediction

# Runs on a schedule, entirely on GitHub's own free infrastructure --
# no Render Cron Job or Background Worker needed for this piece.
on:
  schedule:
    # Every 8 hours, at minute 0. GitHub Actions schedules are always
    # in UTC.
    - cron: '0 */8 * * *'
  # Also allows manually triggering a run from the GitHub Actions tab,
  # useful for testing without waiting for the schedule.
  workflow_dispatch: {}

permissions:
  contents: write   # needed so this workflow can commit the updated prediction/history files back to the repo

jobs:
  update-prediction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn scipy requests

      - name: Run prediction updater
        env:
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
        run: python gold_predictor_updater.py

      - name: Commit and push updated prediction data
        run: |
          git config user.name "gold-predictor-bot"
          git config user.email "actions@github.com"
          git add gold_prediction_latest.json gold_price_history.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update gold prediction data [automated]"
          git push
