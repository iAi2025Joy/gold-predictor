name: Update Gold Prediction

on:
  schedule:
    # Runs every hour on the hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost requests nltk

      - name: Run Gold Predictor Updater
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python gold_predictor_updater.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gold_prediction_latest.json gold_price_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Gold predictions and price history" && git push)
